<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pioneer CT-W606DR Interactive Deck</title>
    <style>
        :root {
            --chassis: #121212;
            --display-bg: #050505;
            --pioneer-gold: #d4af37;
            --display-green: #22ff22;
            --display-red: #ff0000;
        }

        body {
            background-color: #222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #ddd;
        }

        .deck-container {
            width: 850px;
            background: linear-gradient(180deg, #1a1a1a 0%, #000 100%);
            border-radius: 4px;
            padding: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid #333;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 15px;
            border-bottom: 1px solid #222;
            padding-bottom: 5px;
        }

        .brand { font-weight: 900; letter-spacing: 2px; font-size: 18px; }
        .model { color: var(--pioneer-gold); font-size: 14px; font-weight: bold; }

        .main-deck-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .deck-bay {
            width: 260px;
            height: 150px;
            perspective: 1000px;
            position: relative;
        }

        .eject-btn {
            position: absolute;
            top: -5px;
            left: 5px;
            background: #333;
            border: 1px solid #444;
            color: #888;
            font-size: 8px;
            padding: 2px 6px;
            cursor: pointer;
            z-index: 10;
        }

        .cassette-door {
            width: 100%;
            height: 100%;
            background: #111;
            border: 2px solid #222;
            border-radius: 4px;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: bottom;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 20px #000;
        }

        .cassette-door.open { transform: rotateX(-35deg); }

        .door-window {
            width: 85%;
            height: 60px;
            background: rgba(30, 30, 30, 0.8);
            border: 1px solid #333;
            box-shadow: inset 0 0 15px #000;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .spindle {
            width: 25px;
            height: 25px;
            border: 2px dashed #444;
            border-radius: 50%;
        }

        .spindle.spinning { animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .center-console {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .vfd-display {
            background: var(--display-bg);
            height: 85px;
            border: 3px solid #1a1a1a;
            border-radius: 2px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .meter-row {
            display: flex;
            gap: 2px;
            height: 8px;
            margin-bottom: 10px;
        }

        .seg { flex: 1; background: #111; border-radius: 1px; }
        .seg.on-green { background: var(--display-green); box-shadow: 0 0 5px var(--display-green); }
        .seg.on-red { background: var(--display-red); box-shadow: 0 0 5px var(--display-red); }

        .time-code {
            font-family: 'Courier New', monospace;
            color: #ff8800;
            font-size: 20px;
            text-align: center;
            text-shadow: 0 0 8px #ff8800;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }

        .btn {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #eee;
            padding: 8px;
            font-size: 10px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn:active { background: #444; transform: translateY(1px); }
        .btn-play { background: #1a331a; border-color: #2a5a2a; }

        .footer-controls {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
        }

        .file-input-wrapper { font-size: 11px; color: #888; }
        .vol-control { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--pioneer-gold); }
        input[type=range] { accent-color: var(--pioneer-gold); cursor: pointer; }
    </style>
</head>
<body>

<div class="deck-container">
    <div class="header">
        <div class="brand">PIONEER <span style="font-weight: 300; font-size: 10px;">STEREO DOUBLE CASSETTE DECK</span></div>
        <div class="model">CT-W606DR</div>
    </div>

    <div class="main-deck-row">
        <div class="deck-bay">
            <button class="eject-btn" onclick="toggleEject('door1')">⏏ EJECT</button>
            <div id="door1" class="cassette-door">
                <div class="door-window">
                    <div class="spindle" id="spindle1a"></div>
                    <div class="spindle" id="spindle1b"></div>
                </div>
                <div style="font-size: 8px; margin-top: 10px; color: #555;">DECK I PLAYBACK</div>
            </div>
        </div>

        <div class="center-console">
            <div class="vfd-display">
                <div class="meter-row" id="meter"></div>
                <div class="time-code" id="timer">00:00</div>
            </div>
            <div class="controls-grid">
                <button class="btn" onclick="rewind()">◄◄ REV</button>
                <button class="btn btn-play" onclick="playAudio()">PLAY ►</button>
                <button class="btn" onclick="pauseAudio()">|| PAUSE</button>
                <button class="btn" onclick="forward()">FWD ►►</button>
                <button id="dolbyBtn" class="btn" onclick="toggleDolby()" style="grid-column: span 4; margin-top: 5px; border-style: double; color: #888;">DOLBY NR: OFF</button>
            </div>
        </div>

        <div class="deck-bay">
            <button class="eject-btn" onclick="toggleEject('door2')">⏏ EJECT</button>
            <div id="door2" class="cassette-door">
                <div class="door-window">
                    <div class="spindle" id="spindle2a"></div>
                    <div class="spindle" id="spindle2b"></div>
                </div>
                <div style="font-size: 8px; margin-top: 10px; color: #555;">DECK II REC & PLAY</div>
            </div>
        </div>
    </div>

    <div class="footer-controls">
        <div class="file-input-wrapper">
            LOAD AUDIO TAPE: <input type="file" id="fileInput" accept="audio/*">
        </div>
        <div class="vol-control">
            <span>VOLUME</span>
            <input type="range" id="volume" min="0" max="1" step="0.01" value="0.7" oninput="updateVol()">
        </div>
    </div>
</div>

<audio id="audioEngine"></audio>
<script src="script.js"></script>

</body>
</html>
